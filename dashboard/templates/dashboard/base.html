<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CTI Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- D3 Link -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Custom CSS for sidebar and layout -->
    <style>
        :root {
            --navbar-height: 56px;
        }

        body {
            overflow-x: hidden;
        }
        .sidebar {
            width: 240px;
            height: calc(100vh - var(--navbar-height));
            position: fixed;
            top: var(--navbar-height);
            left: 0;
            background: #1f2937;
            color: white;
            padding-top: 12px;
            z-index: 1020;
            overflow-y: auto;
        }
        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .sidebar a:hover {
            background: #374151;
            color: white;
        }
        .sidebar a.active {
        background: #374151;
        color: white;
        font-weight: bold;
        }
        .content {
            margin-left: 240px;
            padding: 20px;
            padding-top: calc(var(--navbar-height) + 20px);
        }
        .navbar-custom {
            background: #111827;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            min-height: 56px;
            height: auto;
            display: flex;
            align-items: center;
            z-index: 1030;
        }
        .navbar-custom .navbar-brand {
            margin-bottom: 0;
        }
        .dark-mode {
        background-color: #1f2937;
        color: #f3f4f6;
        }

        .dark-mode .card {
            background-color: #374151;
            color: #f3f4f6;
        }

        .dark-mode .sidebar {
            background-color: #111827;
        }

        .dark-mode a {
            color: #e5e7eb;
        }
    </style>
</head>

<body class="{% if request.COOKIES.theme|default:'' == 'dark' %}dark-mode{% endif %}">
    
    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-custom px-3 flex-wrap gap-2">
        <div>
            <span class="navbar-brand">CTI Aggregator</span>
        </div>

        <!-- Check if user is authenticated -->
        <div class="d-flex align-items-center gap-2">
            <a href="{% url 'admin:index' %}" class="text-white text-decoration-none">Admin Settings</a>
            <button id="darkModeToggle" class="btn btn-outline-light btn-sm" type="button">Dark Mode</button>
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hello, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% endif %}
        </div>

    </nav>

    <!-- Navigation sidebar for the dashboard -->
    <!-- Each link corresponds to a view in the dashboard app -->
    <div class="sidebar">
        <a href="{% url 'dashboard:dashboard-home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="{% url 'dashboard:dashboard-indicators' %}" class="{% if '/indicators' in request.path %}active{% endif %}">Indicators</a>
        <a href="{% url 'dashboard:dashboard-threat-feeds' %}" class="{% if '/feeds' in request.path %}active{% endif %}">Threat Feeds</a>
        <a href="{% url 'dashboard:dashboard-analytics' %}" class="{% if '/analytics' in request.path %}active{% endif %}">Analytics</a>
        <!-- <a href="{% url 'dashboard:dashboard-settings' %}" class="{% if '/settings' in request.path %}active{% endif %}">Settings</a> -->
    </div>


    <!-- Main Content -->
    <!-- The content block is used to render the specific content for each page -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const toggleButton = document.getElementById('darkModeToggle');
            const navbar = document.querySelector('.navbar-custom');

            function syncNavbarHeight() {
                if (!navbar) return;
                const navbarHeight = navbar.offsetHeight;
                document.documentElement.style.setProperty('--navbar-height', `${navbarHeight}px`);
            }

            function setTheme(isDark) {
                document.body.classList.toggle('dark-mode', isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.cookie = `theme=${isDark ? 'dark' : 'light'}; path=/; max-age=31536000`;
                toggleButton.textContent = isDark ? 'Light Mode' : 'Dark Mode';
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                setTheme(savedTheme === 'dark');
            } else {
                setTheme(document.body.classList.contains('dark-mode'));
            }

            syncNavbarHeight();
            window.addEventListener('resize', syncNavbarHeight);

            toggleButton.addEventListener('click', function () {
                const isDark = !document.body.classList.contains('dark-mode');
                setTheme(isDark);
            });
        })();
    </script>
</body>
</html>
