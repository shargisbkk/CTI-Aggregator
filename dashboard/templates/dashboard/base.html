<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CTI Dashboard{% endblock %}</title>

    <!-- Bootstrap and FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- D3 Link and ECharts -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <!-- Custom CSS for sidebar and layout -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}"
</head>

<body class="{% if request.COOKIES.theme|default:'' == 'dark' %}dark-mode{% endif %}">
    
    <!-- Navbar -->
    <nav class="navbar navbar-custom px-3 flex-wrap gap-2">
        <div>
            <span class="navbar-brand">CTI Aggregator</span>
        </div>

        <!-- Check if user is authenticated -->
        <div class="d-flex align-items-center gap-2">
            <a href="{% url 'admin:index' %}" class="text-decoration-none nav-text">Admin Settings</a>
            <button id="darkModeToggle" class="btn btn-outline-light btn-sm nav-text" type="button">Dark Mode</button>
            {% if user.is_authenticated %}
                <span class="me-3 nav-text">Hello, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm nav-text">Logout</a>
            {% endif %}
        </div>

    </nav>

    <!-- Navigation sidebar for the dashboard -->
    <!-- Each link corresponds to a view in the dashboard app -->
    <div class="sidebar">
        <a href="{% url 'dashboard:dashboard-home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="{% url 'dashboard:dashboard-indicators' %}" class="{% if '/indicators' in request.path %}active{% endif %}">Indicators</a>
        <a href="{% url 'dashboard:dashboard-threat-feeds' %}" class="{% if '/threat-feeds' in request.path %}active{% endif %}">Threat Feeds</a>
        <a href="{% url 'dashboard:dashboard-analytics' %}" class="{% if '/analytics' in request.path %}active{% endif %}">Analytics</a>
        <!-- <a href="{% url 'dashboard:dashboard-settings' %}" class="{% if '/settings' in request.path %}active{% endif %}">Settings</a> -->
    </div>


    <!-- Main Content -->
    <!-- The content block is used to render the specific content for each page -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const toggleButton = document.getElementById('darkModeToggle');
            const navbar = document.querySelector('.navbar-custom');

            function syncNavbarHeight() {
                if (!navbar) return;
                const navbarHeight = navbar.offsetHeight;
                document.documentElement.style.setProperty('--navbar-height', `${navbarHeight}px`);
            }

            function setTheme(isDark) {
                document.body.classList.toggle('dark-mode', isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.cookie = `theme=${isDark ? 'dark' : 'light'}; path=/; max-age=31536000`;
                toggleButton.textContent = isDark ? 'Light Mode' : 'Dark Mode';
                // Refresh ECharts for new theme if they exist
                if (typeof renderThreatConfidenceChart === 'function'){
                    setTimeout(renderThreatConfidenceChart, 10);
                }
                
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                setTheme(savedTheme === 'dark');
            } else {
                setTheme(document.body.classList.contains('dark-mode'));
            }

            syncNavbarHeight();
            window.addEventListener('resize', syncNavbarHeight);

            toggleButton.addEventListener('click', function () {
                const isDark = !document.body.classList.contains('dark-mode');
                setTheme(isDark);
            });
        })();
    </script>
    <script src="{% static 'js/toggle-icons.js' %}"></script>

    <!-- Ingestion results modal — shows on any page when background ingestion finishes -->
    <div class="modal fade" id="ingestionResultsModal" tabindex="-1" aria-labelledby="ingestionResultsLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ingestionResultsLabel">
                        <i class="fas fa-sync-alt me-2"></i>Ingestion Complete
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="ingestionResultsBody"></div>
                <div class="modal-footer" id="ingestionResultsFooter">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .dark-mode .modal-content {
            background-color: var(--clr-dark-surface-tonal-a10);
            color: var(--clr-light-a0);
            border-color: var(--clr-dark-surface-a30);
        }
        .dark-mode .modal-header,
        .dark-mode .modal-footer {
            border-color: var(--clr-dark-surface-a30);
        }
        .dark-mode .modal-header .btn-close {
            filter: invert(1);
        }
        .ingestion-result-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--clr-light-surface-a20);
        }
        .dark-mode .ingestion-result-row {
            border-color: var(--clr-dark-surface-tonal-a20);
        }
        .ingestion-result-row:last-child {
            border-bottom: none;
        }
    </style>

    <script>
    // Poll for ingestion status on every page if ingestion is running
    (function () {
        if (localStorage.getItem('ingestion_polling') !== 'true') return;

        const interval = setInterval(() => {
            fetch('{% url "dashboard:dashboard-ingestion-status" %}')
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'done' || data.status === 'error' || data.status === 'idle') {
                        clearInterval(interval);
                        localStorage.removeItem('ingestion_polling');

                        // Reset button if still on threat feeds page
                        const btn = document.getElementById('updateAllFeedsBtn');
                        if (btn) {
                            btn.disabled = false;
                            document.getElementById('buttonText').textContent = 'Update All Feeds';
                            document.getElementById('loadingSpinner').style.display = 'none';
                        }

                        // Show results modal (skip if server lost track of the run)
                        if (data.status === 'error') {
                            showIngestionError('Ingestion failed. Check the server logs for details.');
                        } else if (data.status === 'done') {
                            showIngestionResults(data.results || []);
                        }
                    }
                })
                .catch(() => {});
        }, 4000);
    })();

    // Show per-source results in the modal
    function showIngestionResults(results) {
        let bodyHtml = '';
        let total = 0;

        results.forEach(r => {
            if (r.error) {
                bodyHtml += `
                    <div class="ingestion-result-row">
                        <i class="fas fa-times-circle me-2" style="color: var(--clr-light-danger-a10); font-size: 1.1rem;"></i>
                        <span class="fw-semibold">${r.name}</span>
                        <span class="ms-auto text-muted small">${r.error}</span>
                    </div>`;
            } else {
                total += r.added;
                bodyHtml += `
                    <div class="ingestion-result-row">
                        <i class="fas fa-check-circle me-2" style="color: var(--clr-light-success-a10); font-size: 1.1rem;"></i>
                        <span class="fw-semibold">${r.name}</span>
                        <span class="ms-auto">
                            <span class="badge" style="background-color: var(--clr-light-success-a0); color: #fff;">
                                +${r.added.toLocaleString()} new
                            </span>
                        </span>
                    </div>`;
            }
        });

        document.getElementById('ingestionResultsBody').innerHTML =
            bodyHtml || '<p class="text-muted mb-0">No results returned.</p>';
        document.getElementById('ingestionResultsFooter').innerHTML = `
            <span class="me-auto fw-semibold">Total: ${total.toLocaleString()} new indicators</span>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        `;

        new bootstrap.Modal(document.getElementById('ingestionResultsModal')).show();
    }

    // Show error in the modal
    function showIngestionError(message) {
        document.getElementById('ingestionResultsBody').innerHTML = `
            <div class="d-flex align-items-center">
                <i class="fas fa-exclamation-triangle me-2" style="color: var(--clr-light-danger-a10); font-size: 1.1rem;"></i>
                <span>${message}</span>
            </div>`;
        document.getElementById('ingestionResultsFooter').innerHTML =
            '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>';
        new bootstrap.Modal(document.getElementById('ingestionResultsModal')).show();
    }
    </script>
</body>
</html>
